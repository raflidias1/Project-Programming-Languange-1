<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Cyber Guess The Number - Ultimate Edition</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdn.jsdelivr.net/npm/daisyui@latest/dist/full.css" rel="stylesheet"/>

<style>
body{
    margin:0;
    background: radial-gradient(circle at top, #0f172a, #020617);
    overflow:hidden;
    font-family:sans-serif;
}

/* Floating Background */
#floatingNumbers{
    position:fixed;
    inset:0;
    z-index:0;
    overflow:hidden;
    pointer-events:none;
}

.float-num{
    position:absolute;
    color:rgba(0,255,255,0.15);
    font-weight:bold;
    animation: floatUp linear infinite;
}

@keyframes floatUp{
    from{transform:translateY(100vh);opacity:0;}
    20%{opacity:1;}
    80%{opacity:1;}
    to{transform:translateY(-10vh);opacity:0;}
}

/* Glass Card */
.glass{
    backdrop-filter: blur(20px);
    background: rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.2);
}

/* Effects */
.shake{animation:shake 0.4s;}
@keyframes shake{
0%{transform:translateX(0)}
25%{transform:translateX(-8px)}
50%{transform:translateX(8px)}
75%{transform:translateX(-8px)}
100%{transform:translateX(0)}
}

.success{box-shadow:0 0 25px #00ffcc;}
.wrong{box-shadow:0 0 25px #ff0055;}

.number-btn:hover{box-shadow:0 0 15px #38bdf8;}

#card{position:relative;z-index:10;}
</style>
</head>

<body class="min-h-screen flex items-center justify-center text-white">

<div id="floatingNumbers"></div>

<div id="card" class="glass p-8 rounded-3xl w-[650px] shadow-2xl text-center transition-all duration-300">

<h1 class="text-3xl font-bold mb-4">🎮 Cyber Guess The Number</h1>

<!-- Input Nama -->
<div class="mb-4">
<input id="playerName" type="text" placeholder="Masukkan Nama Anda lalu tekan enter"
class="input input-bordered w-full text-black" />
</div>

<p class="mb-4 text-gray-300">
Komputer memilih angka dari <b>1 - 10</b>
</p>

<div class="mb-4 text-lg">
Nyawa:
<span id="livesDisplay" class="text-red-400 text-2xl">❤️❤️❤️</span>
</div>

<div id="numberArea" class="grid grid-cols-5 gap-3 mb-6"></div>

<div id="result" class="text-xl font-bold min-h-[40px]"></div>

<div class="mt-4 text-sm text-gray-300">
Skor:
<span id="score" class="text-green-400 font-bold text-lg">0</span>
</div>

<button onclick="resetGame()"
class="btn btn-outline btn-info mt-6">
🔁 Reset Game
</button>

<!-- Leaderboard -->
<div class="mt-8 text-left">
<h2 class="text-xl font-bold mb-2">🏆 Papan Peringkat</h2>
<ul id="leaderboard" class="space-y-1 text-sm"></ul>
</div>

</div>

<script>
let computerNumber;
let score=0;
let lives=3;
let gameOver=false;
let playerReady=false;

const numberArea=document.getElementById("numberArea");
const result=document.getElementById("result");
const card=document.getElementById("card");
const scoreText=document.getElementById("score");
const livesDisplay=document.getElementById("livesDisplay");
const leaderboardUI=document.getElementById("leaderboard");
const nameInput=document.getElementById("playerName");

/* ===========================
   LOAD LEADERBOARD
=========================== */
let leaderboard=JSON.parse(localStorage.getItem("cyberLeaderboard")) || [];
updateLeaderboard();

/* ===========================
   INIT
=========================== */
disableButtons();
generateNumber();
updateLives();

/* ===========================
   INPUT NAMA
=========================== */
nameInput.addEventListener("keydown",function(e){
if(e.key==="Enter"){activatePlayer();}
});

nameInput.addEventListener("blur",function(){
if(nameInput.value.trim()!==""){activatePlayer();}
});

function activatePlayer(){
const name=nameInput.value.trim();
if(name===""){
card.classList.add("shake");
setTimeout(()=>card.classList.remove("shake"),400);
return;
}
playerReady=true;
enableButtons();
result.innerHTML=
`<span class="text-cyan-400 animate-pulse">
🚀 Siap bermain, ${name}!
</span>`;
card.classList.add("success");
setTimeout(()=>card.classList.remove("success"),800);
}

/* ===========================
   GAME LOGIC
=========================== */

function generateNumber(){
computerNumber=Math.floor(Math.random()*10)+1;
}

function updateLives(){
livesDisplay.innerHTML="❤️".repeat(lives);
}

function disableButtons(){
document.querySelectorAll(".number-btn")
.forEach(btn=>btn.disabled=true);
}

function enableButtons(){
document.querySelectorAll(".number-btn")
.forEach(btn=>btn.disabled=false);
}

for(let i=1;i<=10;i++){
const btn=document.createElement("button");
btn.innerText=i;
btn.className="btn btn-outline number-btn";
btn.onclick=()=>checkGuess(i);
numberArea.appendChild(btn);
}

function checkGuess(guess){

if(!playerReady){
result.innerHTML="<span class='text-yellow-400'>⚠ Masukkan nama dulu!</span>";
card.classList.add("shake");
setTimeout(()=>card.classList.remove("shake"),400);
return;
}

if(gameOver)return;

card.classList.remove("success","wrong","shake");

if(guess===computerNumber){

result.innerHTML="<span class='text-green-400'>Tebakan Benar! 🎉</span>";
card.classList.add("success");
score++;
scoreText.innerText=score;
generateNumber();

}else{
lives--;
updateLives();
result.innerHTML="<span class='text-red-400'>Tebakan Salah! ❌</span>";
card.classList.add("wrong","shake");

if(lives===0){endGame();}
}
}

/* ===========================
   END GAME
=========================== */

function endGame(){
gameOver=true;
disableButtons();
result.innerHTML="<span class='text-red-500 text-2xl'>💀 GAME OVER</span>";

const name=nameInput.value.trim();
if(name!=="" && score>0){
leaderboard.push({name,score});
leaderboard.sort((a,b)=>b.score-a.score);
leaderboard=leaderboard.slice(0,10);
localStorage.setItem("cyberLeaderboard",JSON.stringify(leaderboard));
updateLeaderboard();
}
}

/* ===========================
   LEADERBOARD
=========================== */

function updateLeaderboard(){
leaderboardUI.innerHTML="";
leaderboard.forEach((player,index)=>{
let medal="";
if(index===0) medal="🥇";
else if(index===1) medal="🥈";
else if(index===2) medal="🥉";
else medal=`${index+1}.`;

const li=document.createElement("li");
li.innerHTML=
`${medal} 
<span class="text-cyan-400">${player.name}</span> 
- ${player.score}`;
leaderboardUI.appendChild(li);
});
}

/* ===========================
   RESET
=========================== */

function resetGame(){
score=0;
lives=3;
gameOver=false;
playerReady=false;

scoreText.innerText=score;
updateLives();
disableButtons();

result.innerHTML="";
card.classList.remove("success","wrong","shake");

nameInput.value="";
nameInput.focus();

generateNumber();
}

/* ===========================
   FLOATING BACKGROUND
=========================== */

const floatingContainer=document.getElementById("floatingNumbers");

function createFloatingNumber(){
const num=document.createElement("div");
num.classList.add("float-num");
num.innerText=Math.floor(Math.random()*10);
num.style.left=Math.random()*100+"vw";
num.style.fontSize=(Math.random()*40+20)+"px";
num.style.animationDuration=(Math.random()*10+10)+"s";
floatingContainer.appendChild(num);
setTimeout(()=>num.remove(),20000);
}

setInterval(createFloatingNumber,500);
</script>

</body>
</html>
