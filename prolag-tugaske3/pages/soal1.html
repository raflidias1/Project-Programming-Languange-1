<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P1 | Konsumsi BBM</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div id="particles-js" class="particles-js"></div>

    <nav class="navbar">
        <a href="../index.html" class="logo">RAFLY<span>DIAS</span></a>
        <div class="nav-links">
            <a href="../index.html">Dashboard</a>
            <a href="soal1.html" class="active">P1</a>
            <a href="soal2.html">P2</a>
            <a href="soal3.html">P3</a>
            <a href="bonus.html">Bonus</a>
        </div>
    </nav>

    <main class="container">
        <div class="program-card">
            <div class="card-icon" style="color: var(--primary);">
                <i class="fas fa-gas-pump"></i>
            </div>
            
            <h2>Konsumsi BBM</h2>
            <p class="desc">Kalkulasi biaya bensin untuk rute Bogor ke Yogyakarta.</p>

            <div class="data-box">
                <div class="data-row">
                    <span class="label">Jarak Perjalanan</span>
                    <span class="value">560 Km</span>
                </div>
                <div class="data-row">
                    <span class="label">Konsumsi Mobil</span>
                    <span class="value">1 Liter / 12 Km</span>
                </div>
                <div class="data-row">
                    <span class="label">Harga Bensin</span>
                    <span class="value highlight">Rp 13.500 / Liter</span>
                </div>
            </div>

            <button onclick="hitungBBM()">Jalankan Kalkulasi</button>

            <div id="hasil" class="result-area"></div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
        particlesJS('particles-js', {
            particles: {
                number: { value: 40, density: { enable: true, value_area: 800 } },
                color: { value: '#ffffff' },
                opacity: { value: 0.1 },
                size: { value: 2 },
                line_linked: { enable: true, distance: 150, color: '#ffffff', opacity: 0.05, width: 1 },
                move: { enable: true, speed: 1 }
            }
        });
    </script>
    
    <script src="../js/soal1.js"></script>
</body>
</html>
