<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Latihan 1</title>

  <!-- Tailwind + DaisyUI -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@latest/dist/full.css" rel="stylesheet"/>

  <!-- Custom CSS -->
  <link rel="stylesheet" href="css/style.css">

  <!-- Confetti -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>

<body class="min-h-screen flex items-center justify-center text-white">

  <div class="glass rounded-3xl shadow-2xl p-8 w-[400px] transition-all duration-500 hover:scale-105">

    <h2 class="text-2xl font-bold text-center mb-6 tracking-wide">
      🎓 Mahasiswa Sistem Informasi
    </h2>

    <input 
      type="text"
      id="nama"
      placeholder="Masukkan nama kamu..."
      class="input input-bordered w-full text-black mb-4"
      onkeypress="if(event.key==='Enter'){sapa()}"
    />

    <button onclick="sapa()" 
      class="btn w-full bg-white text-green-700 hover:bg-green-700 hover:text-white border-none transition-all duration-300">
      Sapa Saya 🎉
    </button>

    <div id="hasil" class="mt-6 text-center text-lg font-semibold min-h-[60px]"></div>
    <div id="motivasi" class="mt-3 text-center text-sm opacity-90 min-h-[40px]"></div>

  </div>

  <script src="js/script.js"></script>

</body>
</html>
