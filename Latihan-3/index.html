<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal Akademik - Kelulusan</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcodejs/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body {
  background: linear-gradient(-45deg, #ffffff, #e0f2ff, #fff7ed, #dbeafe);
  background-size: 400% 400%;
  animation: gradientBG 15s ease infinite;
}

@keyframes gradientBG {
  0% { background-position:0% 50% }
  50% { background-position:100% 50% }
  100% { background-position:0% 50% }
}

.fade-in {
  animation: fadeIn 0.8s ease-in-out;
}

@keyframes fadeIn {
  from {opacity:0; transform:translateY(15px)}
  to {opacity:1; transform:translateY(0)}
}

.glow-lulus { box-shadow: 0 0 25px rgba(34,197,94,0.6); }
.glow-tidak { box-shadow: 0 0 25px rgba(239,68,68,0.6); }
</style>
</head>

<body class="min-h-screen font-sans">

<header class="bg-blue-600 text-white p-6 shadow-lg">
  <h1 class="text-3xl font-bold text-center">🏛 PORTAL AKADEMIK MAHASISWA</h1>
  <p class="text-center opacity-90">Sistem Informasi Akademik - Penentuan Kelulusan</p>
</header>

<div class="max-w-xl mx-auto mt-10 p-6 flex justify-center">

<!-- INPUT SECTION -->
<div id="inputSection"
class="bg-white/80 backdrop-blur-lg rounded-2xl shadow-xl p-8 w-full">

<h2 class="text-xl font-bold text-blue-700 mb-6">📋 Data Mahasiswa</h2>

<div class="space-y-4">

<input id="nim" type="text" placeholder="NIM"
class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-400 outline-none">

<input id="nama" type="text" placeholder="Nama Mahasiswa"
class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-400 outline-none">

<select id="jenjang"
class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-400 outline-none">
<option value="">Pilih Jenjang</option>
<option>S1</option>
<option>S2</option>
<option>D3</option>
</select>

<select id="fakultas"
class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-400 outline-none"
onchange="updateProdi()">
<option value="">Pilih Fakultas</option>
<option>Ilmu Komputer</option>
<option>Ekonomi</option>
<option>Teknik</option>
</select>

<select id="prodi"
class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-400 outline-none">
<option value="">Pilih Program Studi</option>
</select>

<input id="nilai" type="number" placeholder="Nilai Akhir"
class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-orange-400 outline-none">

<button onclick="prosesKelulusan()"
class="w-full bg-orange-500 hover:bg-orange-600 text-white py-3 rounded-lg font-semibold">
Hasil
</button>

</div>
</div>

<!-- HASIL SECTION -->
<div id="hasilSection"
class="bg-white/90 backdrop-blur-lg rounded-2xl shadow-xl p-8 hidden w-full">

<h2 class="text-xl font-bold text-blue-700 mb-4">📜 Surat Keputusan</h2>

<div id="suratContent"></div>

<div id="qrcode" class="mt-6 flex justify-center"></div>

<button onclick="downloadPDF()"
class="mt-6 bg-blue-600 hover:bg-blue-700 text-white py-2 px-6 rounded-lg">
Download Surat (PDF)
</button>

</div>

</div>

<script>

let dataSurat = {};

function updateProdi() {
const fakultas = document.getElementById("fakultas").value;
const prodi = document.getElementById("prodi");
prodi.innerHTML = '<option value="">Pilih Program Studi</option>';

if (fakultas === "Ilmu Komputer") {
prodi.innerHTML += '<option>Informatika</option>';
prodi.innerHTML += '<option>Sistem Informasi</option>';
prodi.innerHTML += '<option>Teknik Komputer</option>';
}
if (fakultas === "Ekonomi") {
prodi.innerHTML += '<option>Manajemen</option>';
prodi.innerHTML += '<option>Akuntansi</option>';
}
if (fakultas === "Teknik") {
prodi.innerHTML += '<option>Teknik Sipil</option>';
prodi.innerHTML += '<option>Teknik Elektro</option>';
}
}

function generateNomorSurat() {
const bulanRomawi = ["I","II","III","IV","V","VI","VII","VIII","IX","X","XI","XII"];
const now = new Date();
const nomor = Math.floor(Math.random() * 900) + 100;
return `${nomor}/SK/UDI/${bulanRomawi[now.getMonth()]}/${now.getFullYear()}`;
}

function prosesKelulusan() {

const nim = document.getElementById("nim").value;
const nama = document.getElementById("nama").value;
const jenjang = document.getElementById("jenjang").value;
const fakultas = document.getElementById("fakultas").value;
const prodi = document.getElementById("prodi").value;
const nilai = parseFloat(document.getElementById("nilai").value);

if (!nim || !nama || !jenjang || !fakultas || !prodi || isNaN(nilai)) {
alert("Lengkapi semua data!");
return;
}

const nomorSurat = generateNomorSurat();
const lulus = nilai >= 75;

dataSurat = { nim, nama, jenjang, fakultas, prodi, nilai, nomorSurat, lulus };

const badge = lulus
? `<span class="bg-green-500 text-white px-4 py-1 rounded-full glow-lulus">LULUS</span>`
: `<span class="bg-red-500 text-white px-4 py-1 rounded-full glow-tidak">TIDAK LULUS</span>`;

document.getElementById("suratContent").innerHTML = `
<div class="fade-in space-y-2">
<p>Nomor Surat: <b>${nomorSurat}</b></p>
<p>Nama: <b>${nama}</b></p>
<p>NIM: <b>${nim}</b></p>
<p>Jenjang: <b>${jenjang}</b></p>
<p>Fakultas: <b>${fakultas}</b></p>
<p>Program Studi: <b>${prodi}</b></p>
<p>Nilai Akhir: <b>${nilai}</b></p>
<p>Status: ${badge}</p>
</div>
`;

document.getElementById("inputSection").classList.add("hidden");
document.getElementById("hasilSection").classList.remove("hidden");

document.getElementById("qrcode").innerHTML = "";
new QRCode(document.getElementById("qrcode"), {
text: `Validasi SK ${nomorSurat} - ${nama}`,
width: 120,
height: 120
});
}

async function downloadPDF() {

const { jsPDF } = window.jspdf;
const doc = new jsPDF();

doc.setFont("times");
doc.setFontSize(14);
doc.text("UNIVERSITAS DIGITAL INDONESIA", 105, 20, { align: "center" });
doc.setFontSize(12);
doc.text("FAKULTAS " + dataSurat.fakultas.toUpperCase(), 105, 28, { align: "center" });
doc.text("Jl. Pendidikan No. 123 - Indonesia", 105, 34, { align: "center" });

doc.line(20, 38, 190, 38);

doc.setFontSize(13);
doc.text("SURAT KEPUTUSAN KELULUSAN", 105, 50, { align: "center" });

doc.setFontSize(11);
doc.text(`Nomor: ${dataSurat.nomorSurat}`, 20, 60);

doc.text("Dengan ini menyatakan bahwa:", 20, 75);

doc.text(`Nama        : ${dataSurat.nama}`, 25, 85);
doc.text(`NIM         : ${dataSurat.nim}`, 25, 92);
doc.text(`Jenjang     : ${dataSurat.jenjang}`, 25, 99);
doc.text(`Program Studi: ${dataSurat.prodi}`, 25, 106);
doc.text(`Nilai Akhir : ${dataSurat.nilai}`, 25, 113);

const statusText = dataSurat.lulus ? "DINYATAKAN LULUS" : "DINYATAKAN TIDAK LULUS";

doc.setFontSize(12);
doc.text(`Mahasiswa tersebut ${statusText}`, 20, 130);

doc.text("Demikian surat keputusan ini dibuat untuk digunakan sebagaimana mestinya.", 20, 145);

const today = new Date().toLocaleDateString("id-ID");
doc.text(`Ditetapkan di Indonesia`, 130, 170);
doc.text(`Tanggal: ${today}`, 130, 177);

doc.text("Rektor,", 130, 190);
doc.text("Dr. Akademik, M.Kom", 130, 210);

doc.save("Surat_Keputusan_Kelulusan.pdf");
}
</script>

</body>
</html>
