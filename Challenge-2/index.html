<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Login System</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@latest/dist/full.css" rel="stylesheet"/>

  <link rel="stylesheet" href="css/style.css">
</head>

<body class="min-h-screen flex items-center justify-center text-white p-4">

  <div id="card" class="glass p-8 rounded-3xl w-[90%] max-w-[400px] shadow-2xl transition-all duration-500">

    <h2 class="text-2xl font-bold text-center mb-6 tracking-wide">
      🔐 Secure Login
    </h2>

    <!-- Username -->
    <div class="relative mb-4">
      <span class="absolute left-3 top-3 text-gray-400">👤</span>
      <input 
        type="text"
        id="username"
        placeholder="Username"
        class="input input-bordered w-full pl-10 text-black transition-all duration-300"
      />
    </div>

    <!-- Password -->
    <div class="relative mb-4">
      <span class="absolute left-3 top-3 text-gray-400">🔒</span>
      <input 
        type="password"
        id="password"
        placeholder="Password"
        class="input input-bordered w-full pl-10 pr-10 text-black transition-all duration-300"
      />
      <span onclick="togglePassword()" 
        class="absolute right-3 top-3 cursor-pointer text-gray-400 hover:text-white">
        👁
      </span>
    </div>

    <button onclick="login()" 
      class="btn w-full bg-white text-blue-700 hover:bg-blue-700 hover:text-white border-none ripple">
      Login
    </button>

    <div id="loading" class="text-center mt-4 hidden">
      <span class="loading loading-spinner loading-md"></span>
    </div>

    <div id="hasil" class="mt-6 text-center text-lg font-semibold min-h-[40px]"></div>

  </div>

  <script src="js/script.js"></script>
</body>
</html>
